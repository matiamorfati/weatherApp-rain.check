<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rain.check</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="main-page" id="background-img">
      <div class="logo-wrapper drop-shadow">
        <h1 class="logo">rain.check</h1>
      </div>
      <div class="page-content drop-shadow border-angled">
        <div class="search-section border-angled drop-shadow grid-card">
          <form id="weather-form">
            <div class="search-bar border-angled" id="search-div">
              <button type="submit" class="search-bar-btn">
                <img
                  class="search-icon"
                  src="./src/icons/search-2903.svg"
                  alt="search button"
                />
              </button>
              <input
                type="text"
                id="location-input"
                name="location"
                placeholder="Adress, City or Zip Code"
                required
              />
            </div>
          </form>
        </div>

        <div class="home-city-section border-angled drop-shadow grid-card">
          <div class="flex-container-home">
            <div class="current-home-city" id="current-home">Lądek-Zdrój</div>
            <img
              class="homeIcon"
              src="./src/icons/home-175.svg"
              alt="home icon"
            />
          </div>
          <button class="change-current-city-btn" id="change-home-btn">
            Change Home
          </button>
        </div>

        <div class="weather-section border-angled drop-shadow grid-card">
          <div class="main-weather-card" id="weather-output">
            <div class="main-weather-card-info-container">
              <div class="card-title"></div>
              <div class="main-weather-temp"></div>
              <div class="main-weather-card-info"></div>
            </div>
            <div class="main-weather-icon"></div>
          </div>
          <div class="hourlyWrapper">
            <button class="navBtnHourly" id="hourly-left-btn">
              <svg
                viewBox="0 0 24 24"
                preserveAspectRatio="none"
                class="navHourlyBtnIcon iconPrev"
              >
                <path d="M11 3 L17 12 L11 21" />
              </svg>
            </button>
            <div class="hourly-weather-card" id="hourly-grid"></div>
            <button class="navBtnHourly" id="hourly-right-btn">
              <svg
                viewBox="0 0 24 24"
                preserveAspectRatio="none"
                class="navHourlyBtnIcon"
              >
                <path d="M11 3 L17 12 L11 21" />
              </svg>
              <!--  <img
                src="./src/icons/navIcon.svg"
                alt="nav button to right"
                class="navHourlyBtnIcon"
              /> -->
            </button>
          </div>
          <div class="dailyWrapper">
            <div class="daily-weather-card" id="daily-grid"></div>
          </div>
        </div>

        <div
          class="places-listed border-angled grid-card"
          id="listed-cities"
        ></div>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
